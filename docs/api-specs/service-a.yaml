# ============================================
# Service A — OpenAPI 3.0 Specification
# Docs: https://swagger.io/specification/
# ============================================
openapi: 3.0.3
info:
  title: Library Catalog Service API
  description: |
    Service A manages book catalog data and stock reservation for loan requests.
  version: 1.0.0

servers:
  - url: http://localhost:5001
    description: Local development

paths:
  /health:
    get:
      summary: Health check
      operationId: healthCheck
      responses:
        '200':
          description: Service is healthy
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HealthResponse'

  /books:
    get:
      summary: Get all books
      operationId: listBooks
      responses:
        '200':
          description: Book list response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BookListResponse'

  /books/{id}:
    get:
      summary: Get one book by id
      operationId: getBookById
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Book details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Book'
        '404':
          description: Book not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /books/{id}/reserve:
    post:
      summary: Reserve one unit of a book
      operationId: reserveBook
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Reservation succeeded
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ReserveBookResponse'
        '404':
          description: Book not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '409':
          description: Book is out of stock
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

components:
  schemas:
    HealthResponse:
      type: object
      properties:
        status:
          type: string
          example: ok
      required:
        - status

    Book:
      type: object
      properties:
        id:
          type: string
          example: b1
        title:
          type: string
          example: Clean Architecture
        author:
          type: string
          example: Robert C. Martin
        stock:
          type: integer
          minimum: 0
          example: 3
      required:
        - id
        - title
        - author
        - stock

    BookListResponse:
      type: object
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/Book'
      required:
        - items

    ReserveBookResponse:
      type: object
      properties:
        message:
          type: string
          example: Book reserved
        book:
          $ref: '#/components/schemas/Book'
      required:
        - message
        - book

    ErrorResponse:
      type: object
      properties:
        message:
          type: string
          example: Book not found
      required:
        - message