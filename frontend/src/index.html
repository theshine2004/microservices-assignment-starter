<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Library Control Panel</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&family=Bricolage+Grotesque:wght@500;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div class="bg-orb bg-orb-1"></div>
    <div class="bg-orb bg-orb-2"></div>

    <main class="layout">
      <section class="hero">
        <p class="eyebrow">Microservices Assignment</p>
        <h1>Library Control Panel</h1>
        <p class="subtitle">
          A live view of books and loan requests served through the API Gateway.
        </p>
        <button id="refreshBtn" type="button">Refresh Data</button>
      </section>

      <section class="stats" id="stats"></section>

      <section class="panel module-panel">
        <h2>Quick Loan Module</h2>
        <p class="module-note">
          This flow goes through all services: Frontend -> Gateway -> Service B -> Service A.
        </p>
        <form id="loanForm" class="loan-form">
          <label for="bookSelect">Book</label>
          <select id="bookSelect" required>
            <option value="">Select a book</option>
          </select>

          <label for="borrowerInput">Borrower Name</label>
          <input id="borrowerInput" type="text" minlength="2" required placeholder="e.g., Nguyen Van A" />

          <button id="submitLoanBtn" type="submit">Create Loan Request</button>
        </form>
        <p id="loanMessage" class="module-message" aria-live="polite"></p>
      </section>

      <section class="panel-grid">
        <article class="panel">
          <h2>Books</h2>
          <ul id="bookList" class="list"></ul>
        </article>
        <article class="panel">
          <h2>Loan Requests</h2>
          <ul id="loanList" class="list"></ul>
        </article>
      </section>
    </main>

    <script src="./app.js"></script>
  </body>
</html>
